{% extends 'base.html' %}

{% block title %}Edit Poll{% endblock %}

{% block content %}
    <h2 class="mb-4">Edit Poll</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Poll Title</label>
            <input type="text" name="title" class="form-control" value="{{ poll.title }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ poll.description }}</textarea>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="show_results_before_end" id="showResults"
                   {% if poll.show_results_before_end %}checked{% endif %}>
            <label class="form-check-label" for="showResults">
                Show results before poll ends
            </label>
        </div>

        <p class="text-muted">Note: Choices cannot be edited here. Delete and recreate the poll if choices need to change.</p>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'dashboard:manage_polls' %}" class="btn btn-link">Cancel</a>
    </form>
{% endblock %}
