{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <p class="ballot-eyebrow mb-2">Welcome Back</p>
            <h2 class="mb-4">Login</h2>

            <div class="card p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-4">
                            <label class="auth-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <small class="d-block mt-1 fw-semibold" style="color: #C4622D;">{{ field.errors.0 }}</small>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Login</button>
                </form>
            </div>

            <p class="mt-3 text-muted text-center">
                Don't have an account?
                <a href="{% url 'accounts:signup' %}" style="color: #1B2A4A; font-weight: 600;">Sign up here</a>
            </p>
        </div>
    </div>
{% endblock %}
